<head th:fragment="head(title)">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${title}"></title>
  <link rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" />
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"></script>
  <link rel="stylesheet" th:href="@{/css/custom.css}" />
</head>

<nav th:fragment="header()" class="navbar navbar-expand-lg navbar-dark">
  <div class="container">

    <a class="navbar-brand p-0" th:href="@{/}">
      <img th:src="@{/images/logo.png}" alt="Song Rating" height="44" />
    </a>

    <button class="navbar-toggler" type="button"
            data-toggle="collapse" data-target="#navMenu"
            aria-controls="navMenu" aria-expanded="false">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#"
             id="musicasDropdown" role="button"
             data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            Músicas
          </a>
          <div class="dropdown-menu" aria-labelledby="musicasDropdown">
            <a class="dropdown-item" th:href="@{/song}">Listar músicas</a>
            <div class="dropdown-divider"></div>
            <a class="dropdown-item" th:href="@{/song/create}">Cadastrar música</a>
          </div>
        </li>
      </ul>

      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <a class="nav-link nav-logout" th:href="@{/logout}">Sair</a>
        </li>
      </ul>
    </div>

  </div>
</nav>
<br><br>
